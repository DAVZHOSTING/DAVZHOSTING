<!DOCTYPE html>
<html>
<head>
<style>
body{background:#020617;color:white;font-family:sans-serif;}
.card{background:#1e293b;margin:10px;padding:15px;border-radius:15px;}
.cancel{background:red;color:white;}
.accept{background:green;color:white;}
</style>
</head>

<body>

<h2>ADMIN PANEL</h2>
<div id="data"></div>

<script>
function load(){
fetch("/orders")
.then(r=>r.json())
.then(d=>{
let html="";
d.forEach(o=>{
html+=`
<div class="card">
<p>#${o.id}</p>
<p>${o.email}</p>
<p>${o.layanan}</p>
<p>Rp ${o.harga}</p>
<p>${o.tanggal}</p>
<p>${o.status}</p>

<button class="cancel" onclick="update(${o.id},'Cancel')">CANCEL</button>
<button class="accept" onclick="update(${o.id},'Selesai')">ACCEPT</button>
</div>`;
});
data.innerHTML=html;
});
}

function update(id,status){
fetch("/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id,status})
}).then(load);
}

setInterval(load,2000);
load();
</script>

</body>
</html>
